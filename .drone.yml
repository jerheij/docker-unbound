kind: pipeline
name: default

steps:
  - name: docker-tag-build
    image: plugins/docker
    settings:
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD
      repo: jerheij/unbound
      no_cache: true
      tags: ${DRONE_TAG}
    when:
      event:
        - tag

  - name: docker-latest-build
    image: plugins/docker
    settings:
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD
      repo: jerheij/unbound
      no_cache: true
      tags: latest
    when:
      event:
        - push
      branch:
        - main

  - name: docker-stable-build
    image: plugins/docker
    settings:
      username:
        from_secret: DOCKER_USERNAME
      password:
        from_secret: DOCKER_PASSWORD
      repo: jerheij/unbound
      no_cache: true
      tags: stable
    when:
      event:
        - cron
        - push
      branch:
        - stable

  - name: Webhook infra email
    image: jerheij/drone-shell
    settings:
      cmd:
        from_secret: EMAIL_INFRA
    when:
      status: [ success ]
      branch:
        - stable

  - name: Webhook gaunt infra cron
    image: jerheij/drone-shell
    settings:
      cmd:
        from_secret: GAUNT_INFRA
    when:
      status: [ success ]
      branch:
        - stable

  - name: email_notification
    image: plugins/email
    settings:
      host:
        from_secret: SMTP_HOST
      port:
        from_secret: SMTP_PORT
      from:
        from_secret: EMAIL_FROM
      recipients:
        from_secret: EMAIL_TO
      username:
        from_secret: SMTP_USER
      password:
        from_secret: SMTP_PASSWORD
      recipients_only: true
      subject: "Drone Build {{repo.name}}/{{commit.branch}} {{tag}} {{build.status}}"
      body: >
        {{build.link}}
    when:
      status: [ success, changed, failure ]